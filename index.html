<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova AI - Your Ultimate AI Companion</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-MML-AM_CHTML"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar h2 {
            color: white;
            margin-bottom: 30px;
            font-size: 24px;
            text-align: center;
        }

        .nav-btn {
            width: 100%;
            padding: 15px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-btn:hover, .nav-btn.active {
            background: rgba(255, 255, 255, 0.3);
            transform: translateX(5px);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .content-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: none;
        }

        .content-area.active {
            display: block;
        }

        .chat-container {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
            gap: 20px;
            display: flex;
            flex-direction: column;
        }

        .message {
            max-width: 70%;
            margin: 10px;
            padding: 15px 20px;
            border-radius: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .ai-message {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            border-radius: 20px 20px 5px 20px;
        }

        .input-area {
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .file-upload {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 10px;
            padding: 10px;
            color: white;
            cursor: pointer;
        }

        #messageInput {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.9);
            font-size: 16px;
            outline: none;
        }

        #sendBtn {
            padding: 15px 25px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        .generator-form {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 20px;
            margin: 20px;
            color: white;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.9);
            font-size: 16px;
            outline: none;
        }

        .generate-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }

        .result-area {
            margin-top: 30px;
            text-align: center;
        }

        .generated-image, .generated-video {
            max-width: 100%;
            border-radius: 15px;
            margin-top: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .suggestions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .suggestion-chip {
            background: rgba(255, 255, 255, 0.3);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .suggestion-chip:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }

        .moderation-warning {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin: 10px;
            text-align: center;
        }

        .image-preview {
            max-width: 200px;
            max-height: 200px;
            border-radius: 10px;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 70px;
            }
            .nav-btn span {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>Nova AI</h2>
            <button class="nav-btn active" data-tab="chat">
                💬 Chat
            </button>
            <button class="nav-btn" data-tab="image">
                🎨 Image Generator
            </button>
            <button class="nav-btn" data-tab="video">
                🎬 Video Generator
            </button>
            <button class="nav-btn" data-tab="editor">
                ✏️ Photo Editor
            </button>
        </div>

        <div class="main-content">
            <!-- Chat Tab -->
            <div id="chat" class="content-area active">
                <div class="chat-container">
                    <div class="messages" id="messages">
                        <div class="message ai-message">
                            👋 Hello! I'm Nova, your AI companion. I can chat, analyze images, generate art, edit photos, and more. What would you like to do?
                        </div>
                    </div>
                    <div class="input-area">
                        <input type="file" id="imageUpload" class="file-upload" accept="image/*">
                        <input type="text" id="messageInput" placeholder="Type your message...">
                        <button id="sendBtn">Send</button>
                    </div>
                </div>
            </div>

            <!-- Image Generator Tab -->
            <div id="image" class="content-area">
                <div class="generator-form">
                    <h2 style="margin-bottom: 20px; color: white;">🎨 Image Generator</h2>
                    <div class="form-group">
                        <label>Prompt</label>
                        <textarea id="imagePrompt" rows="4" placeholder="Describe the image you want to generate..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Style</label>
                        <select id="imageStyle">
                            <option value="realistic">Realistic</option>
                            <option value="anime">Anime</option>
                            <option value="oil">Oil Painting</option>
                            <option value="cyberpunk">Cyberpunk</option>
                            <option value="watercolor">Watercolor</option>
                            <option value="pixel">Pixel Art</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Size</label>
                        <select id="imageSize">
                            <option value="512x512">512x512</option>
                            <option value="768x768">768x768</option>
                            <option value="1024x1024">1024x1024</option>
                        </select>
                    </div>
                    <button class="generate-btn" onclick="generateImage()">Generate Image</button>
                    <div id="imageResult" class="result-area"></div>
                </div>
            </div>

            <!-- Video Generator Tab -->
            <div id="video" class="content-area">
                <div class="generator-form">
                    <h2 style="margin-bottom: 20px; color: white;">🎬 Video Generator</h2>
                    <div class="form-group">
                        <label>Video Prompt</label>
                        <textarea id="videoPrompt" rows="4" placeholder="Describe the video you want to generate..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Duration</label>
                        <select id="videoDuration">
                            <option value="5s">5 seconds</option>
                            <option value="10s">10 seconds</option>
                            <option value="15s">15 seconds</option>
                        </select>
                    </div>
                    <button class="generate-btn" onclick="generateVideo()">Generate Video</button>
                    <div id="videoResult" class="result-area"></div>
                </div>
            </div>

            <!-- Photo Editor Tab -->
            <div id="editor" class="content-area">
                <div class="generator-form">
                    <h2 style="margin-bottom: 20px; color: white;">✏️ Photo Editor</h2>
                    <div class="form-group">
                        <label>Upload Photo</label>
                        <input type="file" id="photoUpload" accept="image/*">
                        <img id="photoPreview" class="image-preview" style="display: none;">
                    </div>
                    <div class="form-group">
                        <label>Edit Instructions</label>
                        <textarea id="editPrompt" rows="3" placeholder="e.g. 'add angel wings', 'put me on a beach', 'make it cyberpunk'..."></textarea>
                    </div>
                    <button class="generate-btn" onclick="editPhoto()">Edit Photo</button>
                    <div id="editResult" class="result-area"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Content Moderation System
        const BAD_WORDS = [
            'weapon', 'gun', 'bomb', 'explosive', 'kill', 'murder', 'nude', 'naked', 'porn', 'sex',
            'malware', 'virus', 'hack', 'exploit', 'child', 'kid', 'minor'
        ];

        function isContentSafe(text) {
            const lowerText = text.toLowerCase();
            return !BAD_WORDS.some(word => lowerText.includes(word));
        }

        function showModerationWarning() {
            const warning = document.createElement('div');
            warning.className = 'moderation-warning';
            warning.innerHTML = '🛡️ Sorry, that request contains content we cannot process for safety reasons. Please try something else!';
            document.querySelector('.messages').appendChild(warning);
            document.querySelector('.messages').scrollTop = document.querySelector('.messages').scrollHeight;
        }

        // Conversation Memory
        let conversationHistory = [];
        let currentTab = 'chat';

        // Tab Navigation
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.content-area').forEach(area => area.classList.remove('active'));
                
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
                currentTab = btn.dataset.tab;
            });
        });

        // Chat Functionality
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const messages = document.getElementById('messages');
        const imageUpload = document.getElementById('imageUpload');

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        imageUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    addUserMessage(`📷 I uploaded an image: ${file.name}`);
                    analyzeImage(e.target.result);
                };
                reader.readAsDataURL(file);
            }
        });

        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            addUserMessage(text);
            messageInput.value = '';

            if (!isContentSafe(text)) {
                showModerationWarning();
                return;
            }

            // Simulate AI response with features
            setTimeout(() => {
                const response = generateAIResponse(text);
                addAIMessage(response);
            }, 1000);
        }

        function addUserMessage(text) {
            const div = document.createElement('div');
            div.className = 'message user-message';
            div.innerHTML = text;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function addAIMessage(html) {
            const div = document.createElement('div');
            div.className = 'message ai-message';
            div.innerHTML = html;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
            MathJax.Hub.Queue(["Typeset", MathJax.Hub, div]);
        }

        function generateAIResponse(text) {
            conversationHistory.push({ role: 'user', content: text });

            // Smart suggestions
            const suggestions = getSmartSuggestions(text);
            let response = processMessage(text);

            if (suggestions.length > 0) {
                response += '<div class="suggestions">';
                suggestions.forEach(suggestion => {
                    response += `<span class="suggestion-chip" onclick="insertSuggestion('${suggestion}')">${suggestion}</span>`;
                });
                response += '</div>';
            }

            conversationHistory.push({ role: 'assistant', content: response });
            return response;
        }

        function processMessage(text) {
            // Code formatting
            if (/```[\s\S]*?```/.test(text)) {
                return text.replace(/```([\s\S]*?)```/g, '<pre><code class="language-javascript">$1</code></pre>');
            }

            // Math solving
            if (text.includes('$') || text.match(/[\d+\-*/().=]+/)) {
                try {
                    const mathExpr = text.match(/[\d+\-*/().=]+/g)?.join(' ') || '';
                    const result = eval(mathExpr.replace(/=/g, ''));
                    return `${text} = ${result} ${suggestions[Math.floor(Math.random() * suggestions.length)]}`;
                } catch (e) {}
            }

            // Markdown rendering
            return marked.parse(text);

            // Image analysis simulation
            return `Great question! Here's my analysis: ${text}. I can see you're interested in ${text.toLowerCase().split(' ')[0]}.`;
        }

        function analyzeImage(imageData) {
            setTimeout(() => {
                addAIMessage('🔍 Image analyzed! I can see a beautiful scene with vibrant colors and interesting composition. What would you like me to do with it?');
            }, 1500);
        }

        function getSmartSuggestions(text) {
            const suggestions = [
                'Explain this further',
                'Generate an image of this',
                'Write code for this',
                'Solve the math',
                'Make it funnier'
            ];
            return suggestions.slice(0, 3);
        }

        function insertSuggestion(text) {
            messageInput.value = text;
            messageInput.focus();
        }

        // Image Generator
        function generateImage() {
            const prompt = document.getElementById('imagePrompt').value;
            if (!isContentSafe(prompt)) {
                document.getElementById('imageResult').innerHTML = '<div class="moderation-warning">Content blocked for safety.</div>';
                return;
            }

            document.getElementById('imageResult').innerHTML = `
                <div>🎨 Generating image... (Demo)</div>
                <div style="width: 512px; height: 512px; background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4); 
                    margin: 20px auto; border-radius: 15px; display: flex; align-items: center; justify-content: center; 
                    color: white; font-size: 24px; font-weight: bold;">
                    ✨ IMAGE GENERATED<br>"${prompt}"
                </div>
                <p>Style: ${document.getElementById('imageStyle').value} | Size: ${document.getElementById('imageSize').value}</p>
            `;
        }

        // Video Generator
        function generateVideo() {
            const prompt = document.getElementById('videoPrompt').value;
            if (!isContentSafe(prompt)) {
                document.getElementById('videoResult').innerHTML = '<div class="moderation-warning">Content blocked for safety.</div>';
                return;
            }

            document.getElementById('videoResult').innerHTML = `
                <div>🎬 Generating video... (Demo)</div>
                <video class="generated-video" controls autoplay loop muted>
                    <source src="data:video/mp4;base64,..." type="video/mp4">
                    Your browser doesn't support video.
                </video>
                <p>Duration: ${document.getElementById('videoDuration').value} | Prompt: "${prompt}"</p>
            `;
        }

        // Photo Editor
        document.getElementById('photoUpload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('photoPreview').src = e.target.result;
                    document.getElementById('photoPreview').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        function editPhoto() {
            const instructions = document.getElementById('editPrompt').value;
            if (!isContentSafe(instructions)) {
                document.getElementById('editResult').innerHTML = '<div class="moderation-warning">Content blocked for safety.</div>';
                return;
            }

            document.getElementById('editResult').innerHTML = `
                <div>✨ Photo edited! Applied: "${instructions}"</div>
                <img class="generated-image" src="${document.getElementById('photoPreview').src}" alt="Edited photo">
                <p>Edit completed successfully!</p>
            `;
        }

        // Prism.js for code highlighting
        Prism.languages.markdown = Prism.languages.extend("markdown", {});
    </script>
</body>
</html>
